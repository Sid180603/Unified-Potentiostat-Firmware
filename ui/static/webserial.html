<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potentiostat — Web Serial</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .placeholder { background: #f0f0f0; border: 2px dashed #ccc; padding: 2rem; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Web Serial Potentiostat</h1>
    <div class="placeholder">
        <p><strong>Phase 9 Implementation</strong></p>
        <p>This standalone page will use the Web Serial API (Chrome/Edge only) to communicate directly with the potentiostat — no Python server required.</p>
        <p>Features: connect to USB-CDC serial, send CV/DPV commands, real-time Plotly.js chart, CSV/PNG export.</p>
    </div>
    <script>
        // Phase 9: Web Serial API implementation
        // navigator.serial.requestPort() + read/write streams
        if (!('serial' in navigator)) {
            document.querySelector('.placeholder').innerHTML +=
                '<p style="color:red">⚠ Your browser does not support Web Serial API. Use Chrome or Edge.</p>';
        }
    </script>
</body>
</html>
