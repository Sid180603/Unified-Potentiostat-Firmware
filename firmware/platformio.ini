; PlatformIO Configuration — Unified Potentiostat Firmware
;
; Two environments:
;   seeed_xiao — compiles for SAMD21, flashes to board
;   native     — compiles with PC GCC, runs Unity tests without hardware

; === Production: Seeeduino XIAO (SAMD21) ===
[env:seeed_xiao]
platform = atmelsam
board = seeed_xiao
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit ADS1X15@^2.4.0
    Wire
build_flags = -DPRODUCTION -Wl,-u,_scanf_float

; === Development: Native PC unit tests ===
[env:native]
platform = native
test_framework = unity
build_flags = -DUNIT_TEST -DNATIVE_BUILD
lib_deps =
